<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DENNYTECH </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #007bff, #00b894);
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 420px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    h1 {
      color: #e74c3c;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    h2 {
      color: #333;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .highlight {
      background: #ffeb99;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .arrow {
      font-size: 2rem;
      color: #e74c3c;
      margin: 1rem 0;
      animation: bounce 1.5s infinite;
    }

    .btn {
      background: #25D366;
      color: #fff;
      padding: 1rem 2.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      animation: shake 1.2s infinite;
    }

    .btn:hover {
      background: #red;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(3deg); }
      40% { transform: rotate(-3deg); }
      60% { transform: rotate(3deg); }
      80% { transform: rotate(-3deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Don't Miss Out!</h1>
    <h2>Limited Spots Available In This Exclusive WhatsApp Group</h2>
    <p class="highlight">
      Click the button below to join the WhatsApp group where this special training will take place.
    </p>

    <div class="arrow">⬇️</div>

    <p><strong>Click the button to join the WhatsApp group…</strong></p>

    <a href="https://chat.whatsapp.com/FqTN7qw5XAlLK83VFAcftF" class="btn">CLICK HERE TO JOIN THE WHATSAPP GROUP </a>
  </div>
</body>
</html>
